<svg xmlns="http://www.w3.org/2000/svg" width="480" height="1370" viewBox="0 0 480 1370" role="img" aria-labelledby="title description">
  <title id="title">How CLU Governance evaluates an AI-proposed source change</title>
  <desc id="description">A compact mobile diagram showing strict proposal intake, deny-by-default local policy and integrity checks, an allow or deny evidence result, and approval outside CLU.</desc>
  <style>.title{font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:700;fill:#F8FAFC}.sub{font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:500;fill:#9BAAC0}.label{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;fill:#67E8F9}.head{font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:700;fill:#F8FAFC}.body{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:500;fill:#CBD5E1}.mono{font-family:Menlo,monospace;font-size:12px;font-weight:600;fill:#C4B5FD}.allow{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;fill:#6EE7B7}.deny{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;fill:#FCA5A5}.out{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1.3px;fill:#FCD34D}.num{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;fill:#0B1220}</style>
  <rect width="480" height="1370" fill="#0B1220"/><rect x="10" y="10" width="460" height="1350" rx="18" fill="#0F172A" stroke="#304158" stroke-width="2"/>
  <text x="34" y="48" class="label">CLU GOVERNANCE / LOCAL EVIDENCE</text><text x="34" y="84" class="title">Evidence before a source change</text><text x="34" y="110" class="sub">A local check before a separate decision.</text>
  <rect x="24" y="140" width="432" height="910" rx="14" fill="#0B1324" stroke="#49617C" stroke-width="1.5" stroke-dasharray="5 5"/><text x="40" y="159" class="label" style="font-size:10px">CLU-OWNED EVALUATION BOUNDARY</text>
  <g fill="none" stroke="#60748F" stroke-width="2"><path d="M240 315v22"/><path d="M240 470v22"/><path d="M240 625v22"/></g><g fill="#60748F"><path d="M234 333l6 9 6-9z"/><path d="M234 488l6 9 6-9z"/><path d="M234 643l6 9 6-9z"/></g>
  <g><rect x="40" y="180" width="400" height="135" rx="10" fill="#131F33" stroke="#334155" stroke-width="1.5"/><circle cx="65" cy="206" r="13" fill="#5EEAD4"/><text x="61" y="211" class="num">1</text><text x="92" y="211" class="head">PROPOSAL</text><text x="58" y="240" class="body"><tspan x="58" dy="0">AI / coding agent</tspan><tspan x="58" dy="22">Tool · target path · operation</tspan><tspan x="58" dy="22">Declared actor + requested scope</tspan></text></g>
  <g><rect x="40" y="337" width="400" height="133" rx="10" fill="#131F33" stroke="#334155" stroke-width="1.5"/><circle cx="65" cy="363" r="13" fill="#7DD3FC"/><text x="61" y="368" class="num">2</text><text x="92" y="368" class="head">STRICT REQUEST INTAKE</text><text x="58" y="397" class="body"><tspan x="58" dy="0">Strict JSON · duplicate-key</tspan><tspan x="58" dy="22">rejection · schema validation</tspan><tspan x="58" dy="22">Path normalization</tspan></text></g>
  <g><rect x="40" y="492" width="400" height="133" rx="10" fill="#131F33" stroke="#334155" stroke-width="1.5"/><circle cx="65" cy="518" r="13" fill="#A78BFA"/><text x="61" y="523" class="num">3</text><text x="92" y="523" class="head">LOCAL POLICY + INTEGRITY</text><text x="58" y="552" class="body"><tspan x="58" dy="0">Deny by default · actor + scope</tspan><tspan x="58" dy="22">Operation and path allowlists</tspan><tspan x="58" dy="22">Hash and rollback-readiness evidence</tspan></text></g>
  <g><rect x="40" y="658" width="400" height="355" rx="10" fill="#111D31" stroke="#4E7AA1" stroke-width="1.5"/><circle cx="65" cy="684" r="13" fill="#38BDF8"/><text x="61" y="689" class="num">4</text><text x="92" y="689" class="head">CLU EVIDENCE RESULT</text><text x="58" y="718" class="body"><tspan x="58" dy="0">Policy eligibility only — never</tspan><tspan x="58" dy="21">mutation authorization.</tspan></text><rect x="58" y="766" width="364" height="112" rx="8" fill="#0D2A29" stroke="#23856D"/><text x="78" y="792" class="allow">ALLOW / ELIGIBLE</text><text x="78" y="820" class="body"><tspan x="78" dy="0">Separate approval required</tspan><tspan x="78" dy="20">authorized: false</tspan><tspan x="78" dy="20">applied: false · Claude adapter → ask</tspan></text><rect x="58" y="896" width="364" height="98" rx="8" fill="#321C26" stroke="#A94D61"/><text x="78" y="922" class="deny">DENY / BLOCKED</text><text x="78" y="950" class="body"><tspan x="78" dy="0">Exact blocker + reason code</tspan><tspan x="78" dy="20">Configured integration stops tool action</tspan><tspan x="78" dy="20">No mutation applied</tspan></text></g>
  <g><rect x="24" y="1080" width="432" height="144" rx="12" fill="#1E1B15" stroke="#936F27" stroke-width="1.5"/><text x="42" y="1108" class="out">OUTSIDE CLU BOUNDARY</text><text x="42" y="1138" class="head">Separate approval or application</text><text x="42" y="1166" class="body"><tspan x="42" dy="0">Claude permission prompt</tspan><tspan x="42" dy="21">Human / operator approval</tspan><tspan x="42" dy="21">Separate application step</tspan></text></g>
  <text x="34" y="1260" class="body" style="font-size:13px"><tspan x="34" dy="0">Local-first · zero runtime dependencies</tspan><tspan x="34" dy="21">No daemon · no runtime network call</tspan><tspan x="34" dy="21">No default persistent state</tspan></text><text x="34" y="1340" class="label" style="font-size:11px">ALLOW IS NOT APPROVAL</text>
</svg>
